name: Setup VPS
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Evolution API on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 147.93.39.48
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 600s
          command_timeout: 600s
          script: |
            apt-get update -y && apt-get install -y ca-certificates curl
            curl -fsSL https://get.docker.com | sh
            apt-get install -y docker-compose-plugin
            mkdir -p /opt/evo && cd /opt/evo
            cat > docker-compose.yml << 'EOFC'
            version: "3.8"
            services:
              evolution:
                image: atendai/evolution-api:latest
                container_name: evolution
                restart: always
                ports:
                  - "8080:8080"
                environment:
                  - SERVER_URL=http://147.93.39.48:8080
                  - AUTHENTICATION_TYPE=apikey
                  - AUTHENTICATION_API_KEY=agentecreator123
                  - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
                  - QRCODE_LIMIT=30
                  - DEL_INSTANCE=false
                  - DATABASE_ENABLED=false
                  - REDIS_ENABLED=false
                  - LOG_LEVEL=ERROR
                volumes:
                  - evo_store:/evolution/store
                  - evo_inst:/evolution/instances
            volumes:
              evo_store:
              evo_inst:
            EOFC
            docker compose up -d
            sleep 20
            curl -s http://localhost:8080
            echo "INSTALADO_COM_SUCESSO"
